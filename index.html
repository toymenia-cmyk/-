const WORD = {1:"가끔",2:"(머리를)감다",3:"김치찌개",4:"끄다",5:"끓이다",6:"끝나다",7:"나가다",8:"늦게",9:"(모두)다",10:"닦다",11:"대학원",12:"돌아가다",13:"(수업을) 듣다",14:"모임",15:"불(조명)",16:"빨리",17:"샤워하다",18:"세수",19:"시작하다",20:"식사하다",21:"싣다",22:"외우다",23:"이",24:"일찍",25:"장을 보다",26:"졸업하다",27:"주차하다",28:"준비운동",29:"천천히",30:"출근하다",31:"카메라",32:"퇴근하다",33:"화장하다"};
const ALL = Object.values(WORD);
let order=[], qi=0, score=0, answered=false;

function shuffle(a){ var r=a.slice(); for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=r[i];r[i]=r[j];r[j]=t;} return r; }

function start(){
  order = shuffle(Object.keys(WORD).map(Number));
  qi=0; score=0; answered=false;
  document.getElementById('score').textContent=0;
  render();
}

function render(){
  answered=false;
  var id=order[qi], correct=WORD[id];
  document.getElementById('qnum').textContent=qi+1;
  var distractors=shuffle(ALL.filter(function(w){return w!==correct;})).slice(0,3);
  var opts=shuffle([correct].concat(distractors));
  var html='<div class="imgbox"><img src="'+IMG[id]+'" alt=""></div>';
  html+='<div class="q">이 그림에 맞는 단어는?</div>';
  html+='<div class="choices">';
  opts.forEach(function(w){
    html+='<button class="choice" onclick="pick(this,\''+w.replace(/'/g,"\\'")+'\')">'+w+'</button>';
  });
  html+='</div><div class="fb" id="fb"></div>';
  document.getElementById('card').innerHTML=html;
}

function pick(btn, chosen){
  if(answered) return;
  answered=true;
  var correct=WORD[order[qi]];
  var fb=document.getElementById('fb');
  var btns=document.querySelectorAll('.choice');
  btns.forEach(function(b){ b.style.pointerEvents='none'; });
  if(chosen===correct){
    btn.className='choice correct';
    fb.textContent='정답이에요!'; fb.style.color='#2e7d32';
    score++; document.getElementById('score').textContent=score;
  } else {
    btn.className='choice wrong';
    btns.forEach(function(b){ if(b.textContent===correct) b.className='choice correct'; });
    fb.textContent='정답: '+correct; fb.style.color='#666';
  }
  var label = qi < order.length-1 ? '다음 문제' : '결과 보기';
  fb.innerHTML += '<div><button class="next" onclick="next()">'+label+'</button></div>';
}

function next(){
  if(qi < order.length-1){ qi++; render(); }
  else { showResult(); }
}

function showResult(){
  document.getElementById('qnum').textContent=33;
  document.getElementById('card').innerHTML =
    '<div class="result"><h2>'+score+' / 33</h2><p>'+
    (score===33?'완벽해요! 모두 맞혔어요.':score>=25?'잘했어요!':'조금 더 연습해요.')+
    '</p><button class="next" onclick="start()">다시 하기</button></div>';
}

start();
