<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1B 8과 1항 어휘 게임</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;background:#f6f7f9;color:#222;padding:16px}
.wrap{max-width:900px;margin:0 auto}
h1{font-size:20px;margin-bottom:4px}
.sub{color:#777;font-size:13px;margin-bottom:20px}
.bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;font-size:14px}
.chip{background:#e8f0fe;color:#1a56b0;padding:8px 14px;border-radius:8px}
button{background:#fff;border:1px solid #d6d9de;padding:9px 16px;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit}
button:hover{background:#f0f2f5}
.progress{height:6px;background:#e4e6ea;border-radius:3px;overflow:hidden;margin-bottom:20px}
.progress i{display:block;height:100%;background:#4c8bf5;width:0;transition:width .3s}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:30px}
.mode{background:#fff;border:1px solid #e2e4e8;border-radius:14px;padding:26px 20px;text-align:center;cursor:pointer}
.mode:hover{border-color:#4c8bf5}
.mode b{display:block;font-size:17px;margin-bottom:6px}
.mode span{font-size:13px;color:#777}
.match{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.col{display:flex;flex-direction:column;gap:10px}
.word{background:#fff;border:2px solid #e2e4e8;border-radius:10px;padding:14px;text-align:center;font-size:17px;cursor:pointer}
.pic{background:#fff;border:2px solid #e2e4e8;border-radius:10px;padding:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;min-height:84px}
.pic img{max-width:100%;max-height:88px;object-fit:contain}
.sel{border-color:#4c8bf5;background:#eef4ff}
.ok{border-color:#38a169;background:#e9f7ef;opacity:.55;pointer-events:none}
.no{border-color:#e05252;background:#fdecec}
.quiz{text-align:center}
.quiz .pic{max-width:320px;margin:0 auto 24px;min-height:220px}
.quiz .pic img{max-height:220px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:520px;margin:0 auto}
.opt{background:#fff;border:2px solid #e2e4e8;border-radius:10px;padding:16px;font-size:16px;cursor:pointer}
.done{text-align:center;padding:60px 20px}
.done h2{font-size:24px;margin-bottom:10px}
.done p{color:#777;margin-bottom:22px}
.hide{display:none}
@media(max-width:600px){.match{grid-template-columns:1fr 1fr;gap:10px}.opts{grid-template-columns:1fr}.word{font-size:15px;padding:11px}}
</style>
</head>
<body>
<div class="wrap">
  <h1>1B 8과 1항 어휘 게임</h1>
  <div class="sub">그림과 단어를 연결해 보세요</div>

  <div id="menu">
    <div class="modes">
      <div class="mode" onclick="start('match')"><b>짝맞추기</b><span>단어와 그림을 연결</span></div>
      <div class="mode" onclick="start('quiz')"><b>정답 찾기</b><span>그림에 맞는 단어 고르기</span></div>
    </div>
  </div>

  <div id="game" class="hide">
    <div class="bar">
      <span class="chip" id="score"></span>
      <span class="chip" id="tries"></span>
      <button onclick="location.reload()">처음으로</button>
    </div>
    <div class="progress"><i id="pbar"></i></div>
    <div id="board"></div>
  </div>

  <div id="end" class="hide done">
    <h2>완료했습니다! 🎉</h2>
    <p id="stat"></p>
    <button onclick="location.reload()">다시 하기</button>
  </div>
</div>

let mode, pool, done = 0, tries = 0, selW = null, selP = null, cur = null, lock = false;

const shuffle = a => a.map(v => [Math.random(), v]).sort((x, y) => x[0] - y[0]).map(x => x[1]);

  document.getElementById('pbar').style.width = (done / DATA.length * 100) + '%';
}

function finish(){
  document.getElementById('game').classList.add('hide');
  const e = document.getElementById('end');
  e.classList.remove('hide');
  document.getElementById('stat').textContent =
    `총 ${DATA.length}개 단어를 ${tries}번 시도로 완료했습니다.`;
}

/* ---- 짝맞추기 ---- */
function nextRound(){
  if (!pool.length) return finish();
  const round = pool.splice(0, ROUND);
  const board = document.getElementById('board');
  board.className = 'match';
  board.innerHTML = '<div class="col" id="cw"></div><div class="col" id="cp"></div>';
  const cw = document.getElementById('cw'), cp = document.getElementById('cp');
  shuffle(round.slice()).forEach(it => {
    const d = document.createElement('div');
    d.className = 'word'; d.textContent = it.word;
    d.onclick = () => pickW(d, it);
    cw.appendChild(d);
  });
  shuffle(round.slice()).forEach(it => {
    const d = document.createElement('div');
    d.className = 'pic';
    d.innerHTML = `<img src="${it.img}" alt="">`;
    d.onclick = () => pickP(d, it);
    cp.appendChild(d);
  });
  selW = selP = null;
}

function pickW(el, it){
  if (el.classList.contains('ok')) return;
  if (selW) selW.el.classList.remove('sel');
  selW = {el, it}; el.classList.add('sel'); check();
}
function pickP(el, it){
  if (el.classList.contains('ok')) return;
  if (selP) selP.el.classList.remove('sel');
  selP = {el, it}; el.classList.add('sel'); check();
}

function check(){
  if (!selW || !selP) return;
  tries++;
  if (selW.it.id === selP.it.id){
    selW.el.className = 'word ok'; selP.el.className = 'pic ok';
    done++; selW = selP = null; update();
    if (!document.querySelectorAll('.word:not(.ok)').length)
      setTimeout(nextRound, 450);
  } else {
    const a = selW.el, b = selP.el;
    a.classList.add('no'); b.classList.add('no'); update();
    selW = selP = null;
    setTimeout(() => { a.className = 'word'; b.className = 'pic'; }, 550);
  }
}

/* ---- 정답 찾기 ---- */
function nextQuiz(){
  if (!pool.length) return finish();
  cur = pool.shift(); lock = false;
  const others = shuffle(DATA.filter(d => d.id !== cur.id)).slice(0, 3);
  const opts = shuffle([cur, ...others]);
  const board = document.getElementById('board');
  board.className = 'quiz';
  board.innerHTML = `<div class="pic"><img src="${cur.img}" alt=""></div><div class="opts" id="op"></div>`;
  const op = document.getElementById('op');
  opts.forEach(o => {
    const d = document.createElement('div');
    d.className = 'opt'; d.textContent = o.word;
    d.onclick = () => answer(d, o);
    op.appendChild(d);
  });
}

function answer(el, o){
  if (lock) return;
  lock = true; tries++;
  if (o.id === cur.id){
    el.classList.add('ok'); done++; update();
    setTimeout(nextQuiz, 650);
  } else {
    el.classList.add('no'); update();
    document.querySelectorAll('.opt').forEach(x => {
      if (x.textContent === cur.word) x.classList.add('ok');
    });
    pool.push(cur);
    setTimeout(nextQuiz, 1100);
  }
}
</script>
